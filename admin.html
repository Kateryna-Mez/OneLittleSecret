<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Little Secret • Admin</title>

<link rel="stylesheet" href="style.css">

<style>

body{

    background:#fffaf8;

    font-family:Poppins,sans-serif;

    padding:40px;

}

.wrapper{

    max-width:900px;

    margin:auto;

}

.card{

    background:white;

    border-radius:24px;

    padding:30px;

    margin-bottom:25px;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

}

h1{

    text-align:center;

    margin-bottom:35px;

}

h2{

    margin-bottom:20px;

}

.guest{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:12px 0;

    border-bottom:1px solid #eee;

}

.guest:last-child{

    border:none;

}

button{

    cursor:pointer;

    border:none;

    border-radius:12px;

    padding:10px 16px;

    background:#8fc8ff;

    color:white;

    font-weight:600;

}

button:hover{

    opacity:.9;

}

.big{

    width:100%;

    margin-top:10px;

}

</style>

</head>

<body>

<div class="wrapper">

<h1>

💙 One Little Secret

</h1>

<div class="card">

<h2>

Персональные ссылки

</h2>

<div id="guestTable"></div>

</div>

<div class="card">

<h2>

Google Form

</h2>

<button
class="big"
id="formButton">

Открыть форму

</button>

</div>

<div class="card">

<h2>

Google Таблица

</h2>

<button
class="big"
id="sheetButton">

Открыть ответы

</button>

</div>

</div>

<script src="guests.js"></script>

<script src="admin.js"></script>

</body>

</html>
